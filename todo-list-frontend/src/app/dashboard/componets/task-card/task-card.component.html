<div class="task-card" [class.completed-card]="task.status === 'COMPLETED'">
  <div class="card-header">
    <div class="card-meta">
      <span class="status-badge" [class]="statusClass">{{ statusLabel }}</span>
      <span class="label-chip" *ngIf="task.label">{{ task.label }}</span>
    </div>
    <div class="card-actions">
      <button class="icon-btn edit-btn" title="Edit" (click)="edit.emit(task)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="icon-btn delete-btn" title="Delete" (click)="delete.emit(task.id)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
  </div>

  <h3 class="task-name" [class.crossed]="task.status === 'COMPLETED'">
    {{ task.taskName }}
  </h3>

  <div class="card-footer">
    <span class="due-date" [class.overdue]="isOverdue">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span *ngIf="isOverdue" class="overdue-text">Overdue · </span>
      {{ formattedDate }}
    </span>
  </div>
</div>
