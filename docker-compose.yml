services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.3
    container_name: todolist-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: todolist
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ─────────────────────────────────────────
  app:
    build:
      context: ./todoList-spring-boot/               # root of your repo
      dockerfile: Dockerfile
    container_name: todolist-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/todolist?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Angular Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./Angular/
      dockerfile: Dockerfile   # see below
    container_name: todolist-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "4200:80"                 # Nginx serves on 80 inside, mapped to 4200 outside

volumes:
  mysql_data: